model:
  backbone: resnet18
  num_classes: 2
  input_feature: mel_spectrogram
  input_shape: [1, 128, 128]
  dropout: 0.5
  pretrained: true

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.0001
  lr_scheduler: cosine
  lr_step_size: 10
  lr_gamma: 0.5
  weight_decay: 0.01
  val_split: 0.20
  seed: 42
  mixed_precision: false
  gradient_clip: 1.0
  early_stopping_patience: 10

checkpointing:
  checkpoint_dir: models/
  save_every: 5
  keep_top_k: 3
  monitor_metric: val_auc
